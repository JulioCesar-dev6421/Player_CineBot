<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reprodutor Responsivo</title>
    <!-- Tailwind CSS para o design da tela de ajuda/boas-vindas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Estilos para garantir que o iframe ocupe 100% da tela real sem barras de rolagem indesejadas */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0b0f19;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .iframe-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none; /* Oculto por padrão até validar os parâmetros */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="text-slate-200 flex flex-col items-center justify-center min-h-screen p-4">

    <!-- Container do iFrame (Ocupa a tela cheia se os parâmetros existirem) -->
    <div id="iframeContainer" class="iframe-container">
        <iframe id="myIframe" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
    </div>

    <!-- Interface Amigável (Exibida apenas se faltarem parâmetros na URL) -->
    <div id="setupInterface" class="max-w-xl w-full bg-slate-900 border border-slate-800 rounded-2xl p-6 md:p-8 shadow-2xl relative z-20 hidden">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-blue-500/10 text-blue-400 mb-3">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white mb-2">Reprodutor de iFrame Dinâmico</h1>
            <p class="text-slate-400 text-sm">Insira os parâmetros na URL para carregar o conteúdo automaticamente ou teste abaixo.</p>
        </div>

        <!-- Instruções de Uso -->
        <div class="bg-slate-950 rounded-xl p-4 mb-6 border border-slate-800 text-xs md:text-sm">
            <span class="text-blue-400 font-semibold block mb-1">Como usar diretamente na URL:</span>
            <code id="exampleUrl" class="text-emerald-400 break-all select-all block bg-black/40 p-2 rounded mt-1 font-mono">
                https://seusite.com/?tipo=player&id=9999
            </code>
        </div>

        <!-- Formulário de Teste Local -->
        <div class="space-y-4">
            <div>
                <label for="inputTipo" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tipo (tipo)</label>
                <input type="text" id="inputTipo" placeholder="Ex: player, embed, video" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            <div>
                <label for="inputId" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">ID (id)</label>
                <input type="text" id="inputId" placeholder="Ex: 12345" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
            </div>
            <button id="btnCarregar" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-medium py-3 px-4 rounded-xl transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500/50 mt-2">
                Carregar iFrame agora
            </button>
        </div>
    </div>

    <script>
        // Função principal que lê os parâmetros e configura o iframe
        function carregarIframe() {
            // Obtém os parâmetros da query string da URL atual (?tipo=XXX&id=YYY)
            const params = new URLSearchParams(window.location.search);
            const tipo = params.get('tipo');
            const id = params.get('id');

            const iframeContainer = document.getElementById('iframeContainer');
            const setupInterface = document.getElementById('setupInterface');
            const myIframe = document.getElementById('myIframe');

            if (tipo && id) {
                // Monta a URL final com base nos parâmetros recebidos
                const urlIframe = `https://myembed.biz/${encodeURIComponent(tipo)}/${encodeURIComponent(id)}`;
                
                // Define o source do iframe e o exibe em tela cheia
                myIframe.src = urlIframe;
                iframeContainer.style.display = 'block';
                setupInterface.style.display = 'none';
            } else {
                // Se faltarem parâmetros, configura a interface de demonstração
                iframeContainer.style.display = 'none';
                setupInterface.style.display = 'block';

                // Atualiza o exemplo com a URL atual do visitante
                const currentOrigin = window.location.origin + window.location.pathname;
                document.getElementById('exampleUrl').innerText = `${currentOrigin}?tipo=exemplo&id=12345`;
            }
        }

        // Evento do botão para testar os parâmetros direto pela interface
        document.getElementById('btnCarregar').addEventListener('click', function() {
            const tipo = document.getElementById('inputTipo').value.trim();
            const id = document.getElementById('inputId').value.trim();

            if (tipo && id) {
                // Redireciona a página para ela mesma adicionando os parâmetros na URL
                const novaUrl = `${window.location.pathname}?tipo=${encodeURIComponent(tipo)}&id=${encodeURIComponent(id)}`;
                window.location.href = novaUrl;
            } else {
                alert('Por favor, preencha ambos os campos para testar.');
            }
        });

        // Executa a validação assim que o DOM estiver pronto
        window.onload = carregarIframe;
    </script>
</body>
</html>
