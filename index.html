<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player iFrame Dinâmico</title>
    <style>
        /* Reset básico e variáveis de cores */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-color: #0a0f1d;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #00d2ff; /* Azul neon */
            --accent-hover: #00a8cc;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container do iFrame (ocupa tela cheia quando ativo) */
        .iframe-container {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background-color: #000;
        }

        /* Painel de configuração quando faltam parâmetros */
        .setup-container {
            display: none;
            width: 100%;
            max-width: 420px;
            padding: 32px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .setup-container h2 {
            color: var(--text-main);
            font-size: 1.6rem;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .setup-container p {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        /* Grupos do Formulário */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            color: var(--text-main);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.2s ease;
            outline: none;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.15);
        }

        /* Botão estilizado */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--accent-color);
            border: none;
            border-radius: 8px;
            color: #020617;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="iframe-container" id="player-screen">
        <iframe id="video-player" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>

    <div class="setup-container" id="setup-screen">
        <h2>Carregar Conteúdo</h2>
        <p>Insira os dados abaixo para gerar o player dinamicamente.</p>
        
        <form id="setup-form" onsubmit="gerarUrl(event)">
            <div class="form-group">
                <label for="tipo">Tipo de Conteúdo</label>
                <select id="tipo" required>
                    <option value="" disabled selected>Selecione o tipo...</option>
                    <option value="filme">Filme</option>
                    <option value="serie">Série</option>
                    <option value="anime">Anime</option>
                </select>
            </div>

            <div class="form-group">
                <label for="id">ID do Conteúdo</label>
                <input type="text" id="id" placeholder="Ex: 12345" required autocomplete="off">
            </div>

            <button type="submit" class="btn-submit">Assistir Agora</button>
        </form>
    </div>

    <script>
        function verificarParametros() {
            const urlParams = new URLSearchParams(window.location.search);
            const tipo = urlParams.get('tipo');
            const id = urlParams.get('id');

            const playerScreen = document.getElementById('player-screen');
            const setupScreen = document.getElementById('setup-screen');
            const iframe = document.getElementById('video-player');

            if (tipo && id) {
                // Se existirem os parâmetros, monta e carrega o iFrame
                iframe.src = `https://superflixapi.fit/${tipo}/${id}`;
                playerScreen.style.display = 'block';
                setupScreen.style.display = 'none';
            } else {
                // Se faltar algum, exibe o formulário de configuração
                playerScreen.style.display = 'none';
                setupScreen.style.display = 'block';
            }
        }

        function gerarUrl(event) {
            event.preventDefault(); // Evita o recarregamento padrão do formulário

            const tipoValue = document.getElementById('tipo').value;
            const idValue = document.getElementById('id').value.trim();

            if (tipoValue && idValue) {
                // Modifica a URL do navegador inserindo os parâmetros sem recarregar do zero
                const novaUrl = `${window.location.pathname}?tipo=${encodeURIComponent(tipoValue)}&id=${encodeURIComponent(idValue)}`;
                window.history.pushState({}, '', novaUrl);

                // Executa a verificação novamente para carregar o player imediatamente
                verificarParametros();
            }
        }

        // Executa a checagem ao abrir a página
        window.onload = verificarParametros;
    </script>
</body>
</html>
